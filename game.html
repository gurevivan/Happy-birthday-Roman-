<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Грибной вайб 🍄</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;touch-action:manipulation}
  html,body{height:100%;overflow:hidden}
  body{font-family:"Segoe UI",-apple-system,Roboto,Arial,sans-serif;color:#fff;background:#120a25}

  /* живой переливающийся фон */
  #bg{position:fixed;inset:0;z-index:0;
    background:linear-gradient(130deg,#3a1c71,#d76d77,#ffaf7b,#43cea2,#185a9d);
    background-size:400% 400%;animation:flow 16s ease infinite;filter:saturate(1.1)}
  @keyframes flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  #fx{position:fixed;inset:0;z-index:1;pointer-events:none}

  /* HUD */
  #hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;
    justify-content:space-between;align-items:flex-start;padding:16px 20px;
    font-weight:800;text-shadow:0 2px 10px rgba(0,0,0,.45)}
  #score{font-size:34px;line-height:1}
  #scoreLbl{font-size:12px;opacity:.8;letter-spacing:2px;text-transform:uppercase}
  #combo{font-size:20px;text-align:right;transition:transform .1s}
  #best{font-size:12px;opacity:.85;text-align:right;margin-top:4px}

  /* поле и гриб */
  #field{position:absolute;inset:0;z-index:5}
  #shroom{position:absolute;width:96px;height:96px;display:none;
    font-size:78px;line-height:96px;text-align:center;cursor:pointer;z-index:6;
    filter:drop-shadow(0 8px 14px rgba(0,0,0,.4));will-change:transform}
  @keyframes pop{0%{transform:scale(0) rotate(-25deg)}70%{transform:scale(1.18) rotate(6deg)}100%{transform:scale(1) rotate(0)}}
  .in{animation:pop .22s cubic-bezier(.34,1.56,.64,1) both}
  .ring{position:absolute;border-radius:50%;border:3px solid rgba(255,255,255,.5);
    pointer-events:none;z-index:6;animation:ring .45s ease-out forwards}
  @keyframes ring{from{opacity:.8;transform:scale(.3)}to{opacity:0;transform:scale(2.4)}}

  /* всплывающий счёт */
  .pop{position:absolute;z-index:7;font-weight:900;font-size:30px;pointer-events:none;
    text-shadow:0 2px 8px rgba(0,0,0,.5);animation:fly .7s ease-out forwards}
  @keyframes fly{from{opacity:1;transform:translateY(0) scale(1)}
    to{opacity:0;transform:translateY(-70px) scale(1.4)}}

  /* старт */
  .overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:28px;
    background:rgba(18,10,37,.5);backdrop-filter:blur(4px)}
  .overlay h1{font-size:clamp(32px,10vw,60px);margin-bottom:14px;
    text-shadow:0 4px 20px rgba(0,0,0,.5)}
  .overlay p{font-size:clamp(15px,4.5vw,19px);opacity:.92;margin-bottom:4px}
  .btn{margin-top:26px;border:none;cursor:pointer;font-size:23px;font-weight:800;color:#3a1c71;
    padding:18px 50px;border-radius:50px;background:#ffd84d;
    box-shadow:0 12px 34px rgba(0,0,0,.4);animation:bob 1.6s ease-in-out infinite}
  .btn:active{transform:scale(.95)}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .hidden{display:none !important}
</style>
</head>
<body>
  <div id="bg"></div>
  <canvas id="fx"></canvas>

  <div id="hud">
    <div><div id="scoreLbl">очки</div><div id="score">0</div></div>
    <div><div id="combo"></div><div id="best">🏆 0</div></div>
  </div>

  <div id="field"><div id="shroom">🍄</div></div>

  <div id="start" class="overlay">
    <h1>Грибной вайб 🍄</h1>
    <p>Тапай по грибам — лови вайб.</p>
    <p>Без конца. Чем дальше — тем шустрее ✨</p>
    <button class="btn" id="startBtn">Поехали ▶</button>
  </div>

<script>
  const field=document.getElementById("field");
  const shroom=document.getElementById("shroom");
  const scoreEl=document.getElementById("score");
  const comboEl=document.getElementById("combo");
  const bestEl=document.getElementById("best");
  const startScr=document.getElementById("start");
  const cv=document.getElementById("fx"), ctx=cv.getContext("2d");

  let W,H; function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  resize(); addEventListener("resize",resize);

  let score=0, combo=0, best=+(localStorage.getItem("shroom_best")||0);
  let playing=false, golden=false, lifetime=0, deadline=0, raf=null;
  bestEl.textContent="🏆 "+best;

  /* ===== звук (WebAudio) ===== */
  let ac=null;
  function blip(freq){
    try{
      ac=ac||new (window.AudioContext||window.webkitAudioContext)();
      const o=ac.createOscillator(), g=ac.createGain();
      o.type="sine"; o.frequency.value=freq;
      o.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(.0001,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(.25,ac.currentTime+.01);
      g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.18);
      o.start(); o.stop(ac.currentTime+.2);
    }catch(e){}
  }

  /* ===== частицы ===== */
  let parts=[], spores=[];
  for(let i=0;i<28;i++) spores.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:1+Math.random()*2.5,vy:-.2-Math.random()*.5,vx:-.2+Math.random()*.4,a:.2+Math.random()*.4});
  const COLORS=["#ffd84d","#ff6b9d","#7ee8fa","#a685e2","#52e3a3","#ffffff"];
  function burst(x,y,n,gold){
    for(let i=0;i<n;i++){const ang=Math.random()*6.28,sp=2+Math.random()*6;
      parts.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp-2,
        r:3+Math.random()*5,life:1,c:gold?"#ffd84d":COLORS[(Math.random()*COLORS.length)|0]});}
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    // споры фоновые
    spores.forEach(s=>{s.y+=s.vy;s.x+=s.vx;if(s.y<-5){s.y=H+5;s.x=Math.random()*W;}
      ctx.globalAlpha=s.a;ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();});
    // взрывы
    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life-=.025;
      ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,6.28);ctx.fill();});
    parts=parts.filter(p=>p.life>0);
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  draw();

  /* ===== игра ===== */
  function startGame(){
    score=0;combo=0;scoreEl.textContent=0;comboEl.textContent="";
    playing=true;startScr.classList.add("hidden");
    blip(440);spawn();loop();
  }

  function spawn(){
    const pad=14,topPad=86,size=96;
    const x=pad+Math.random()*(W-size-pad*2);
    const y=topPad+Math.random()*(H-size-topPad-pad);
    golden=Math.random()<0.12;             // 12% — золотой бонус
    shroom.textContent=golden?"🌟":"🍄";
    shroom.style.left=x+"px";shroom.style.top=y+"px";
    shroom.style.display="block";
    shroom.classList.remove("in");void shroom.offsetWidth;shroom.classList.add("in");
    // бесконечно ускоряемся, но мягкий потолок 480мс
    lifetime=Math.max(480,1400-score*16);
    deadline=performance.now()+lifetime;
  }

  function loop(){
    if(!playing)return;
    if(performance.now()>=deadline){ combo=0;comboEl.textContent=""; spawn(); } // промах — не конец, просто новый гриб
    raf=requestAnimationFrame(loop);
  }

  function ringAt(x,y){const r=document.createElement("div");r.className="ring";
    r.style.left=(x-40)+"px";r.style.top=(y-40)+"px";r.style.width="80px";r.style.height="80px";
    field.appendChild(r);setTimeout(()=>r.remove(),460);}
  function popText(x,y,txt,col){const p=document.createElement("div");p.className="pop";
    p.textContent=txt;p.style.color=col;p.style.left=x+"px";p.style.top=y+"px";
    field.appendChild(p);setTimeout(()=>p.remove(),700);}

  function hit(e){
    if(!playing)return; e.preventDefault();
    const rect=shroom.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const gain=golden?5:1;
    score+=gain; combo++;
    scoreEl.textContent=score;
    comboEl.textContent=combo>1?("x"+combo+" 🔥"):"";
    comboEl.style.transform="scale(1.3)";setTimeout(()=>comboEl.style.transform="scale(1)",100);
    if(score>best){best=score;localStorage.setItem("shroom_best",best);bestEl.textContent="🏆 "+best;}
    burst(cx,cy,golden?40:18,golden);
    ringAt(cx,cy);
    popText(cx-14,cy-20,(golden?"+5":"+1"),golden?"#ffd84d":"#fff");
    blip(golden?880:420+Math.min(combo*18,500));
    if(navigator.vibrate)navigator.vibrate(golden?[20,30,20]:18);
    shroom.style.display="none";
    setTimeout(spawn,90);
  }

  shroom.addEventListener("touchstart",hit,{passive:false});
  shroom.addEventListener("mousedown",hit);
  document.getElementById("startBtn").addEventListener("click",startGame);
</script>
</body>
</html>
