<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Карпом по петуху 🐓🐟</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;touch-action:manipulation}
  html,body{height:100%;overflow:hidden}
  body{font-family:"Segoe UI",-apple-system,Roboto,Arial,sans-serif;color:#fff;background:#1a1230}

  #bg{position:fixed;inset:0;z-index:0;
    background:linear-gradient(130deg,#ff9a3c,#ff5e62,#7b2ff7,#2bd2ff,#43cea2);
    background-size:400% 400%;animation:flow 16s ease infinite;filter:saturate(1.15)}
  @keyframes flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  #fx{position:fixed;inset:0;z-index:1;pointer-events:none}

  #hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;
    justify-content:space-between;align-items:flex-start;padding:16px 20px;
    font-weight:800;text-shadow:0 2px 10px rgba(0,0,0,.45)}
  #score{font-size:34px;line-height:1}
  #scoreLbl{font-size:12px;opacity:.8;letter-spacing:2px;text-transform:uppercase}
  #combo{font-size:20px;text-align:right;transition:transform .1s}
  #best{font-size:12px;opacity:.85;text-align:right;margin-top:4px}

  #field{position:absolute;inset:0;z-index:5}

  /* петух */
  #rooster{position:absolute;width:104px;height:104px;display:none;
    font-size:84px;line-height:104px;text-align:center;cursor:pointer;z-index:6;
    filter:drop-shadow(0 8px 14px rgba(0,0,0,.4));will-change:transform}
  @keyframes pop{0%{transform:scale(0) translateY(40px)}70%{transform:scale(1.15) translateY(-6px)}100%{transform:scale(1) translateY(0)}}
  .in{animation:pop .24s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes knock{0%{transform:scale(1) rotate(0)}
    30%{transform:scale(1.15) rotate(-18deg)}
    100%{transform:scale(0) rotate(40deg) translateY(60px)}}
  .knock{animation:knock .35s ease-in both !important}

  /* карп-удар */
  .carp{position:absolute;z-index:8;font-size:80px;pointer-events:none;
    transform-origin:80% 80%;animation:whack .3s ease-in forwards}
  @keyframes whack{
    0%{opacity:0;transform:translate(60px,-90px) rotate(-70deg) scale(.6)}
    45%{opacity:1;transform:translate(0,-10px) rotate(10deg) scale(1.1)}
    60%{transform:translate(0,0) rotate(20deg) scale(1.15)}
    100%{opacity:0;transform:translate(0,0) rotate(20deg) scale(1.05)}}

  .ring{position:absolute;border-radius:50%;border:4px solid rgba(255,255,255,.6);
    pointer-events:none;z-index:6;animation:ring .45s ease-out forwards}
  @keyframes ring{from{opacity:.8;transform:scale(.3)}to{opacity:0;transform:scale(2.6)}}

  .pop{position:absolute;z-index:9;font-weight:900;font-size:30px;pointer-events:none;
    text-shadow:0 2px 8px rgba(0,0,0,.5);animation:fly .7s ease-out forwards}
  @keyframes fly{from{opacity:1;transform:translateY(0) scale(1)}
    to{opacity:0;transform:translateY(-72px) scale(1.4)}}

  .overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:28px;
    background:rgba(26,18,48,.55);backdrop-filter:blur(4px)}
  .overlay h1{font-size:clamp(28px,8.5vw,52px);margin-bottom:14px;
    text-shadow:0 4px 20px rgba(0,0,0,.5)}
  .overlay p{font-size:clamp(15px,4.5vw,19px);opacity:.92;margin-bottom:4px}
  .btn{margin-top:26px;border:none;cursor:pointer;font-size:23px;font-weight:800;color:#7b2ff7;
    padding:18px 50px;border-radius:50px;background:#ffd84d;
    box-shadow:0 12px 34px rgba(0,0,0,.4);animation:bob 1.6s ease-in-out infinite}
  .btn:active{transform:scale(.95)}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .hidden{display:none !important}
</style>
</head>
<body>
  <div id="bg"></div>
  <canvas id="fx"></canvas>

  <div id="hud">
    <div><div id="scoreLbl">петухов побито</div><div id="score">0</div></div>
    <div><div id="combo"></div><div id="best">🏆 0</div></div>
  </div>

  <div id="field"><div id="rooster">🐓</div></div>

  <div id="start" class="overlay">
    <h1>Карпом по петуху 🐓🐟</h1>
    <p>Вылезает петух — лупи его по башке!</p>
    <p>Без конца. Чем дальше — тем шустрее ✨</p>
    <button class="btn" id="startBtn">Поехали ▶</button>
  </div>

<script>
  const field=document.getElementById("field");
  const rooster=document.getElementById("rooster");
  const scoreEl=document.getElementById("score");
  const comboEl=document.getElementById("combo");
  const bestEl=document.getElementById("best");
  const startScr=document.getElementById("start");
  const cv=document.getElementById("fx"), ctx=cv.getContext("2d");

  let W,H; function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  resize(); addEventListener("resize",resize);

  let score=0, combo=0, best=+(localStorage.getItem("rooster_best")||0);
  let playing=false, golden=false, lifetime=0, deadline=0, raf=null;
  bestEl.textContent="🏆 "+best;

  let ac=null;
  function thud(freq){
    try{
      ac=ac||new (window.AudioContext||window.webkitAudioContext)();
      const o=ac.createOscillator(), g=ac.createGain();
      o.type="square"; o.frequency.setValueAtTime(freq,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(freq*0.5,ac.currentTime+.12);
      o.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(.0001,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(.3,ac.currentTime+.01);
      g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.2);
      o.start(); o.stop(ac.currentTime+.22);
    }catch(e){}
  }

  let parts=[], spores=[];
  for(let i=0;i<26;i++) spores.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:1+Math.random()*2.5,vy:-.2-Math.random()*.5,vx:-.2+Math.random()*.4,a:.2+Math.random()*.4});
  const COLORS=["#ffd84d","#ff6b9d","#7ee8fa","#a685e2","#52e3a3","#ffffff"];
  function burst(x,y,n,gold){
    for(let i=0;i<n;i++){const ang=Math.random()*6.28,sp=2+Math.random()*6;
      parts.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp-2,
        r:3+Math.random()*5,life:1,c:gold?"#ffd84d":COLORS[(Math.random()*COLORS.length)|0]});}
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    spores.forEach(s=>{s.y+=s.vy;s.x+=s.vx;if(s.y<-5){s.y=H+5;s.x=Math.random()*W;}
      ctx.globalAlpha=s.a;ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();});
    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life-=.025;
      ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,6.28);ctx.fill();});
    parts=parts.filter(p=>p.life>0);
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  draw();

  function startGame(){
    score=0;combo=0;scoreEl.textContent=0;comboEl.textContent="";
    playing=true;startScr.classList.add("hidden");
    thud(300);spawn();loop();
  }

  function spawn(){
    const pad=14,topPad=96,size=104;
    const x=pad+Math.random()*(W-size-pad*2);
    const y=topPad+Math.random()*(H-size-topPad-pad);
    golden=Math.random()<0.12;                 // золотой петух = бонус
    rooster.textContent=golden?"🐔":"🐓";
    rooster.style.left=x+"px";rooster.style.top=y+"px";
    rooster.style.display="block";
    rooster.classList.remove("knock");
    rooster.classList.remove("in");void rooster.offsetWidth;rooster.classList.add("in");
    lifetime=Math.max(480,1400-score*16);
    deadline=performance.now()+lifetime;
  }

  function loop(){
    if(!playing)return;
    if(performance.now()>=deadline){ combo=0;comboEl.textContent=""; spawn(); }
    raf=requestAnimationFrame(loop);
  }

  function ringAt(x,y){const r=document.createElement("div");r.className="ring";
    r.style.left=(x-40)+"px";r.style.top=(y-40)+"px";r.style.width="80px";r.style.height="80px";
    field.appendChild(r);setTimeout(()=>r.remove(),460);}
  function popText(x,y,txt,col){const p=document.createElement("div");p.className="pop";
    p.textContent=txt;p.style.color=col;p.style.left=x+"px";p.style.top=y+"px";
    field.appendChild(p);setTimeout(()=>p.remove(),700);}
  function carpStrike(x,y){const c=document.createElement("div");c.className="carp";
    c.textContent="🐟";c.style.left=(x-10)+"px";c.style.top=(y-30)+"px";
    field.appendChild(c);setTimeout(()=>c.remove(),320);}

  function hit(e){
    if(!playing)return; e.preventDefault();
    const rect=rooster.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const gain=golden?5:1;
    score+=gain; combo++;
    scoreEl.textContent=score;
    comboEl.textContent=combo>1?("x"+combo+" 🔥"):"";
    comboEl.style.transform="scale(1.3)";setTimeout(()=>comboEl.style.transform="scale(1)",100);
    if(score>best){best=score;localStorage.setItem("rooster_best",best);bestEl.textContent="🏆 "+best;}
    // карп бьёт, петух получает по башке
    carpStrike(cx,cy);
    rooster.classList.remove("in");
    rooster.classList.add("knock");
    burst(cx,cy,golden?42:20,golden);
    ringAt(cx,cy);
    popText(cx-22,cy-26,(golden?"+5 💥":"БАЦ! 💥"),golden?"#ffd84d":"#fff");
    thud(golden?420:300);
    if(navigator.vibrate)navigator.vibrate(golden?[25,30,25]:25);
    // прячем зону клика, но даём доиграть анимации нокаута
    rooster.style.pointerEvents="none";
    setTimeout(()=>{rooster.style.display="none";rooster.style.pointerEvents="auto";spawn();},150);
  }

  rooster.addEventListener("touchstart",hit,{passive:false});
  rooster.addEventListener("mousedown",hit);
  document.getElementById("startBtn").addEventListener("click",startGame);
</script>
</body>
</html>
